joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.10
    autorepeat_rate: 30.0

teleop_twist_joy_node:
  ros__parameters:
    require_enable_button: true
    enable_button: 8
    axis_linear:
      x: 1
      y: 0
      z: 0
    scale_linear:
      x: 0.5
      y: 0.0
      z: 0.0
    axis_angular:
      yaw: 2
      pitch: 0
      roll: 0
    scale_angular:
      yaw: 1.0
      pitch: 0.0
      roll: 0.0
    enable_turbo_button: -1
    scale_linear_turbo:
      x: 0.5
      y: 0.0
      z: 0.0
    scale_angular_turbo:
      yaw: 1.0
      pitch: 0.0
      roll: 0.0
